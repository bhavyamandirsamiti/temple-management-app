    function getAllMonthsFromJoinTillNow(joinDate) {
        const join = new Date(joinDate);
        const now = new Date();
        const monthsList = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
        let all = [];
        for(let y = join.getFullYear(); y <= now.getFullYear(); y++) {
            let sm = (y === join.getFullYear()) ? join.getMonth() : 0;
            let em = (y === now.getFullYear()) ? now.getMonth() : 11;
            for(let m = sm; m <= em; m++) { all.push({ year: y, month: monthsList[m], monthIndex: m }); }
        }
        return all;
    }
    function getMonthlyAmountForDate(member, date) {
        if(!member.monthlyAmountHistory || member.monthlyAmountHistory.length === 0) return member.monthlyAmount;
        let sorted = [...member.monthlyAmountHistory].sort((a,b) => new Date(a.effectiveDate) - new Date(b.effectiveDate));
        let effective = sorted[0].amount;
        for(let h of sorted) { if(new Date(h.effectiveDate) <= new Date(date)) effective = h.amount; }
        return effective;
    }
    function getCurrentMonthYear() {
        const now = new Date();
        const monthsList = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर'];
        return { month: monthsList[now.getMonth()], year: now.getFullYear(), monthIndex: now.getMonth() };
    }
    function computeAdvanceAndPending() {
        for(let m of appData.members) {
            if(m.status !== 'active') continue;
            let monthlyDonations = (appData.donations || []).filter(d => d.memberId === m.id && d.type === 'monthly');
            let advanceDonations = (appData.donations || []).filter(d => d.memberId === m.id && d.type === 'advance');
            let totalAdvance = advanceDonations.reduce((sum, d) => sum + d.amount, 0);
            let allMonths = getAllMonthsFromJoinTillNow(m.joinDate);
            let expected = 0, paid = 0;
            for(let mon of allMonths) {
                let monthDate = new Date(mon.year, mon.monthIndex, 1);
                expected += getMonthlyAmountForDate(m, monthDate);
            }
            paid = monthlyDonations.reduce((s,d)=>s+d.amount,0);
            let pending = expected - paid;
            let advBal = totalAdvance;
            if(advBal > 0 && pending > 0) {
                if(advBal >= pending) { advBal -= pending; pending = 0; }
                else { pending -= advBal; advBal = 0; }
            }
            m.pending = pending > 0 ? pending : 0;
            m.advanceBalance = advBal > 0 ? advBal : 0;
        }
        saveToLocal();
    }

    let bulkPreviewList = [];
    function renderBulkImport() {
        bulkPreviewList = [];
        document.getElementById('contentArea').innerHTML = `
            <div class="card"><div class="card-title">📥 बल्क इम्पोर्ट सदस्य (एक साथ असीमित सदस्य जोड़ें)</div>
            <div class="form-group"><label>डेटा फॉर्मेट (CSV) - नाम, पिता का नाम, मोबाइल, गाँव, मासिक राशि, ज्वाइन तिथि (YYYY-MM-DD)</label><p style="font-size:12px; color:gray;">प्रति पंक्ति एक सदस्य - कोई सीमा नहीं, जितने चाहें उतने डालें</p></div>
            <textarea id="bulkCsvData" rows="10" class="bulk-textarea" placeholder="राम कुमार, श्री कृष्ण, 9876543210, गुलाबपुरा, 200, 2024-01-01&#10;सीता देवी, रामलाल, 9876543211, मोहनगढ़, 200, 2024-01-15"></textarea>
            <button class="btn btn-primary" onclick="previewBulkMembers()">👁️ प्रीव्यू देखें</button>
            <div id="bulkPreviewContainer" class="bulk-preview" style="display:none;"></div>
            <button id="saveBulkBtn" class="btn btn-success mt-2" style="display:none;" onclick="saveBulkMembers()">✅ सभी सदस्य सेव करें</button>
            </div>`;
    }
    function previewBulkMembers() {
        let csvData = document.getElementById('bulkCsvData').value;
        let lines = csvData.split('\n');
        bulkPreviewList = [];
        for(let line of lines) {
            line = line.trim();
            if(!line) continue;
            let parts = line.split(',');
            if(parts.length >= 1 && parts[0].trim()) {
                let name = parts[0]?.trim() || '';
                let father = parts[1]?.trim() || '';
                let mobile = parts[2]?.trim() || '';
                let village = parts[3]?.trim() || '';
                let amount = parts[4] ? parseInt(parts[4].trim()) : appData.settings.defaultMonthly;
                let joinDate = parts[5] ? parts[5].trim() : new Date().toISOString().slice(0,10);
                if(name && mobile) {
                    bulkPreviewList.push({ name, father, mobile, village, amount, joinDate, photo: "" });
                }
            }
        }
        if(bulkPreviewList.length === 0) { showToast("कोई मान्य डेटा नहीं", true); return; }
        let previewHtml = `<h4>${bulkPreviewList.length} सदस्य मिले (कोई सीमा नहीं):</h4>`;
        bulkPreviewList.slice(0, 20).forEach((m, idx) => {
            previewHtml += `<div class="bulk-preview-item"><span><strong>${m.name}</strong> - ${m.mobile} - ₹${m.amount}/माह</span></div>`;
        });
        if(bulkPreviewList.length > 20) previewHtml += `<div>... और ${bulkPreviewList.length - 20} सदस्य</div>`;
        document.getElementById('bulkPreviewContainer').innerHTML = previewHtml;
        document.getElementById('bulkPreviewContainer').style.display = 'block';
        document.getElementById('saveBulkBtn').style.display = 'inline-block';
    }
    function saveBulkMembers() {
        if(bulkPreviewList.length === 0) { showToast("कोई सदस्य नहीं", true); return; }
        let added = 0;
        for(let m of bulkPreviewList) {
            if(!appData.members) appData.members = [];
            appData.members.push({ id: Date.now() + Math.random(), name: m.name, father: m.father, mobile: m.mobile, village: m.village, monthlyAmount: m.amount, monthlyAmountHistory: [{ amount: m.amount, effectiveDate: m.joinDate }], joinDate: m.joinDate, status: 'active', photo: m.photo, advanceBalance: 0, pending: 0, created_by: currentUser.name, editHistory: [] });
            added++;
        }
        computeAdvanceAndPending();
        saveToLocal();
        showToast(added + " सदस्य जुड़ गए");
        bulkPreviewList = [];
        document.getElementById('bulkPreviewContainer').style.display = 'none';
        document.getElementById('saveBulkBtn').style.display = 'none';
        document.getElementById('bulkCsvData').value = '';
        switchSub('memberList');
    }

    function getPendingMonthsForMember(memberId, selectedYear = null) { let m = (appData.members || []).find(x=>x.id===memberId); if(!m) return []; const allMonths = getAllMonthsFromJoinTillNow(m.joinDate); const paidMonths = (appData.donations || []).filter(d => d.memberId === m.id && d.type === 'monthly').map(d => ({ year: d.year, month: d.month })); let pendingMonths = []; for(let item of allMonths) { if(selectedYear && item.year !== selectedYear) continue; let isPaid = paidMonths.some(p => p.year === item.year && p.month === item.month); if(!isPaid) { pendingMonths.push(item); } } return pendingMonths; }
    function openPaymentModal(memberId, year) { let m = (appData.members || []).find(x=>x.id===memberId); if(!m) return; let pendingMonths = getPendingMonthsForMember(memberId, year); if(pendingMonths.length === 0) { showToast("इस वर्ष सभी जमा हैं", true); return; } let checkboxes = pendingMonths.map(p => `<div class="checklist-item"><input type="checkbox" value="${p.month}" class="month-checkbox"> <label>${p.month}</label></div>`).join(''); let totalAmount = pendingMonths.length * m.monthlyAmount; let html = `<div class="modal" id="paymentModal"><div class="modal-content"><h3>💰 भुगतान - ${m.name} (वर्ष ${year})</h3><div class="form-group"><label>बकाया महीने (चुनें)</label><div class="checklist"><div class="checklist-item"><input type="checkbox" id="selectAllMonths"> <strong>सभी का चयन करें</strong></div>${checkboxes}</div></div><div class="form-group"><label>राशि (₹)</label><input id="payAmount" class="form-control" value="${totalAmount}" readonly></div><div class="form-group"><label>मोड</label><select id="payMode" class="form-control"><option>Cash</option><option>UPI</option><option>Bank Transfer</option></select></div><button class="btn btn-primary" onclick="processPaymentWithMonths(${memberId}, ${year})">दान करें & रसीद</button><button class="btn btn-secondary mt-2" onclick="closeModal()">रद्द</button></div></div>`; document.body.insertAdjacentHTML('beforeend', html); document.getElementById('selectAllMonths').addEventListener('change', function(e) { document.querySelectorAll('.month-checkbox').forEach(cb => cb.checked = e.target.checked); updatePaymentAmount(m.monthlyAmount); }); document.querySelectorAll('.month-checkbox').forEach(cb => { cb.addEventListener('change', () => updatePaymentAmount(m.monthlyAmount)); }); }

    function printMonthlyReport() { let year = new Date().getFullYear(); let months = ['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितम्बर','अक्टूबर','नवम्बर','दिसम्बर']; let rows = months.map(m=>{ let amt = (appData.donations || []).filter(d=>d.type==='monthly' && d.month===m && d.year===year).reduce((s,d)=>s+d.amount,0); return `<tr><td style="color:var(--saffron);">${m}</td><td style="color:var(--success);">₹${amt}</td>`; }).join(''); let printContent = `<html><head><title>मासिक रिपोर्ट ${year}</title><style>body{font-family:Arial;padding:20px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:8px;text-align:left} th{background:#FF9933;color:white}</style></head><body><h2>🚩 मासिक रिपोर्ट ${year}</h2><table><thead><tr><th>महीना</th><th>दान (₹)</th></tr></thead><tbody>${rows}</tbody></table><p>दिनांक: ${new Date().toLocaleDateString()}</p><p>${appData.settings.president} (अध्यक्ष) | ${appData.settings.secretary} (सचिव)</p></body></html>`; let win = window.open('', '_blank'); win.document.write(printContent); win.document.close(); win.print(); }
    function renderYearlyReport() { const currentYear = new Date().getFullYear(); let years = []; for(let y = 2024; y <= currentYear; y++) { years.push(y); } let rows = ''; for(let y of years) { let amt = (appData.donations || []).filter(d=>d.year===y).reduce((s,d)=>s+d.amount,0); let exp = (appData.expenses || []).filter(e=>new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0); let profit = amt - exp; rows += `<tr><td style="color:var(--saffron);">${y}</td><td style="color:var(--success);">₹${amt}</td><td style="color:var(--danger);">₹${exp}</td><td style="color:var(--saffron);">₹${profit}</td></tr>`; } document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📆 वार्षिक रिपोर्ट (आय / व्यय / लाभ) (${years[0]} - ${currentYear})</div><div class="table-responsive"><table class="data-table"><thead><tr><th>वर्ष</th><th>कुल दान (₹)</th><th>कुल व्यय (₹)</th><th>लाभ/हानि (₹)</th></tr></thead><tbody>${rows}</tbody></table></div><button class="btn btn-info mt-2" onclick="printYearlyReport()">🖨️ प्रिंट करें</button></div>`; }
    function printYearlyReport() { const currentYear = new Date().getFullYear(); let years = []; for(let y = 2024; y <= currentYear; y++) { years.push(y); } let rows = ''; for(let y of years) { let amt = (appData.donations || []).filter(d=>d.year===y).reduce((s,d)=>s+d.amount,0); let exp = (appData.expenses || []).filter(e=>new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0); let profit = amt - exp; rows += `<tr><td style="color:var(--saffron);">${y}</td><td style="color:var(--success);">₹${amt}</td><td style="color:var(--danger);">₹${exp}</td><td style="color:var(--saffron);">₹${profit}</td></tr>`; } let printContent = `<html><head><title>वार्षिक रिपोर्ट</title><style>body{font-family:Arial;padding:20px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:8px;text-align:left} th{background:#FF9933;color:white}</style></head><body><h2>🚩 वार्षिक रिपोर्ट (आय/व्यय/लाभ) (${years[0]} - ${currentYear})</h2><tr><thead><tr><th>वर्ष</th><th>कुल दान</th><th>कुल व्यय</th><th>लाभ/हानि</th></tr></thead><tbody>${rows}</tbody></table><p>दिनांक: ${new Date().toLocaleDateString()}</p><p>${appData.settings.president} (अध्यक्ष) | ${appData.settings.secretary} (सचिव)</p></body></html>`; let win = window.open('', '_blank'); win.document.write(printContent); win.document.close(); win.print(); }
    function renderPendingReport() { computeAdvanceAndPending(); let rows = (appData.members || []).filter(m=>m.pending>0 && m.status==='active').map(m=>`<tr><td style="color:var(--saffron);">${m.name}</td><td style="color:var(--gray);">${m.village}</td><td style="color:var(--danger);">₹${m.pending}</td></tr>`).join(''); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">⚠️ बकाया रिपोर्ट</div><div class="table-responsive"><table class="data-table"><thead><tr><th>नाम</th><th>गाँव</th><th>बकाया</th></tr></thead><tbody>${rows}</tbody></table></div><button class="btn btn-info mt-2" onclick="printPendingReport()">🖨️ प्रिंट करें</button></div>`; }
    function printPendingReport() { let rows = (appData.members || []).filter(m=>m.pending>0 && m.status==='active').map(m=>`<tr><td style="color:var(--saffron);">${m.name}</td><td style="color:var(--gray);">${m.village}</td><td style="color:var(--danger);">₹${m.pending}</td></tr>`).join(''); let printContent = `<html><head><title>बकाया रिपोर्ट</title><style>body{font-family:Arial;padding:20px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:8px;text-align:left} th{background:#FF9933;color:white}</style></head><body><h2>🚩 बकाया सदस्य रिपोर्ट</h2></table><thead><tr><th>नाम</th><th>गाँव</th><th>बकाया</th></tr></thead><tbody>${rows}</tbody></table><p>दिनांक: ${new Date().toLocaleDateString()}</p><p>${appData.settings.president} (अध्यक्ष) | ${appData.settings.secretary} (सचिव)</p></body></html>`; let win = window.open('', '_blank'); win.document.write(printContent); win.document.close(); win.print(); }
    function renderAuditReport() { let logs = (appData.auditLogs || []).map(l=>`<tr><td style="color:var(--gray);">${l.timestamp.slice(0,10)}</td><td style="color:var(--saffron);">${l.user}</td><td style="color:var(--cyan);">${l.role}</td><td style="color:var(--teal);">${l.action}</td><td style="color:var(--gray);">${l.details}</td></tr>`).join(''); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📋 ऑडिट लॉग</div><div class="table-responsive"><table class="data-table"><thead><tr><th>तिथि</th><th>उपयोगकर्ता</th><th>रोल</th><th>कार्य</th><th>विवरण</th></tr></thead><tbody>${logs}</tbody></table></div><button class="btn btn-info mt-2" onclick="printAuditLog()">🖨️ प्रिंट करें</button></div>`; }
    function printAuditLog() { let logs = (appData.auditLogs || []).map(l=>`<tr><td style="color:var(--gray);">${l.timestamp.slice(0,10)}</td><td style="color:var(--saffron);">${l.user}</td><td style="color:var(--cyan);">${l.role}</td><td style="color:var(--teal);">${l.action}</td><td style="color:var(--gray);">${l.details}</td></tr>`).join(''); let printContent = `<html><head><title>ऑडिट लॉग</title><style>body{font-family:Arial;padding:20px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:8px;text-align:left} th{background:#FF9933;color:white}</style></head><body><h2>🚩 ऑडिट लॉग</h2><tr><thead><tr><th>तिथि</th><th>उपयोगकर्ता</th><th>रोल</th><th>कार्य</th><th>विवरण</th><tr></thead><tbody>${logs}</tbody></table><p>दिनांक: ${new Date().toLocaleDateString()}</p><p>${appData.settings.president} (अध्यक्ष) | ${appData.settings.secretary} (सचिव)</p></body></html>`; let win = window.open('', '_blank'); win.document.write(printContent); win.document.close(); win.print(); }

    function renderGeneralSettings() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">⚙️ समिति सेटिंग्स</div><input id="setName" value="${appData.settings.committeeName}" class="form-control"><input id="setSub" value="${appData.settings.committeeSubtitle}" class="form-control mt-2"><input id="setUpi" value="${appData.settings.upiId}" class="form-control mt-2"><input id="president" value="${appData.settings.president}" class="form-control mt-2"><input id="secretary" value="${appData.settings.secretary}" class="form-control mt-2"><input type="file" id="logoUpload" accept="image/*" class="form-control mt-2"><button class="btn btn-primary mt-3" onclick="saveGeneralSettings()">सेव करें</button></div>`; }
    function saveGeneralSettings() { let logoFile = document.getElementById('logoUpload').files[0]; let save = (logoUrl) => { if(logoUrl) appData.settings.logo = logoUrl; appData.settings.committeeName = document.getElementById('setName').value; appData.settings.committeeSubtitle = document.getElementById('setSub').value; appData.settings.upiId = document.getElementById('setUpi').value; appData.settings.president = document.getElementById('president').value; appData.settings.secretary = document.getElementById('secretary').value; saveToLocal(); document.getElementById('headerTitle').innerHTML = appData.settings.committeeName; if(appData.settings.logo) document.getElementById('committeeLogoImg').src = appData.settings.logo; showToast("सेटिंग्स सेव हुईं"); }; if(logoFile) { let reader = new FileReader(); reader.onload = e => save(e.target.result); reader.readAsDataURL(logoFile); } else { save(null); } }
    function renderSocialSettings() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🔗 सोशल सेटिंग्स</div><input id="fbLink" placeholder="Facebook" class="form-control"><button class="btn btn-primary mt-2" onclick="saveSocialSettings()">सेव करें</button></div>`; }
    function saveSocialSettings() { showToast("सेव हुआ"); }
    function renderGoogleSheets() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📊 Google Sheets</div><input id="sheetId" placeholder="Sheet ID" class="form-control"><button class="btn btn-primary mt-2" onclick="saveGoogleSheets()">सेव करें</button></div>`; }
    function saveGoogleSheets() { showToast("सेव हुआ"); }
    function renderBackup() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">📦 बैकअप</div><button class="btn btn-success" onclick="backupNow()">💾 बैकअप डाउनलोड</button><button class="btn btn-info mt-2" onclick="restoreFromFile()">📂 रिस्टोर</button><button class="btn btn-info mt-2" onclick="backupToGoogleDrive()">☁️ Google Drive</button></div>`; }
    function backupNow() { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(appData)])); a.download = `mandir_backup.json`; a.click(); showToast("बैकअप लिया"); }
    function restoreFromFile() { let inp = document.createElement('input'); inp.type='file'; inp.onchange=e=>{ let file=e.target.files[0]; let reader=new FileReader(); reader.onload=ev=>{ appData=JSON.parse(ev.target.result); saveToLocal(); location.reload(); }; reader.readAsText(file); }; inp.click(); }
    function renderUsers() { if(currentUser.role !== 'super_admin') { document.getElementById('contentArea').innerHTML = '<div class="card">❌ केवल सुपर एडमिन</div>'; return; } let userHtml = (appData.users || []).map(u=>`<div class="member-card"><div>${u.name} (${u.role})</div><button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button></div>`).join(''); document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">👥 यूजर</div>${userHtml}<button class="btn btn-primary mt-2" onclick="openAddUserModal()">+ नया</button></div>`; }
    function renderTheme() { document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-title">🎨 थीम</div><button class="btn btn-primary" onclick="document.body.classList.toggle('dark')">🌙 डार्क मोड</button></div>`; }

    function doLogin() { let user = (appData.users || []).find(u=>u.email===document.getElementById('loginEmail').value && u.password===document.getElementById('loginPassword').value); if(user) { currentUser = user; document.getElementById('loginPage').style.display = 'none'; document.getElementById('appContainer').style.display = 'block'; document.getElementById('userName').innerText = user.name; document.getElementById('userRoleBadge').innerText = user.role; if(appData.settings.logo) document.getElementById('committeeLogoImg').src = appData.settings.logo; computeAdvanceAndPending(); renderNavigation(); renderCurrentPage(); addAuditLog("LOGIN", "successful"); } else { document.getElementById('loginError').innerText = "गलत लॉगिन"; } }
    function doLogout() { if(bulkInterval) clearInterval(bulkInterval); currentUser = null; document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; navigationStack = []; }

    document.getElementById('darkModeToggle')?.addEventListener('click', () => document.body.classList.toggle('dark'));
    loadFromLocal();
</script>
